<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vegyes vizsgaszimuláció</title>
  <link rel="stylesheet" href="css.css">
  <style>
    .tobbszoros-badge {
      display: inline-block;
      background: linear-gradient(135deg, #f76707, #fd7e14);
      color: white;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 10px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .egyszerű-badge {
      display: inline-block;
      background: linear-gradient(135deg, #4c6ef5, #748ffc);
      color: white;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 10px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <header>
    <h1>Semmelweis Egyetem - ETK - Gyógytornász államvizsga tesztbank kérdések</h1>
    <p>Vegyes vizsgaszimuláció – 60 egyszerű + 40 többszörös feleletválasztás</p>
  </header>

  <!-- Töltés -->
  <div id="loading">
    <div class="spinner"></div>
    Kérdések betöltése…
  </div>

  <!-- Hiba -->
  <div id="hiba">
    ⚠️ <span id="hiba-szoveg"></span>
    <br><br>
    <button class="btn btn-primary" onclick="betolt()">Újra próbálom</button>
    <button class="btn btn-primary" onclick="go('index.html')">Más módon tanulok</button>
  </div>

  <!-- Kvíz -->
  <div id="kviz-screen">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width: 0%"></div>
    </div>
    <div class="progress-label">
      <span id="progress-szoveg">1 / ?</span>
      <span id="pontszam-label">0 helyes</span>
    </div>

    <div class="card">
      <div class="question-number" id="kerdes-szam">Kérdés 1</div>
      <div id="kerdes-badge"></div>
      <div class="question-text" id="kerdes-szoveg"></div>
      <div class="valaszok" id="valaszok"></div>
      <div class="feedback" id="feedback"></div>
      <div class="btn-row">
        <button class="btn btn-primary" id="ellenor-btn" onclick="ellenor()" style="display:none">Ellenőrzés</button>
        <button class="btn btn-primary" id="tovabb-btn" onclick="kovetkezo()" style="display:none">Következő →</button>
      </div>
    </div>
  </div>

  <!-- Eredmény -->
  <div id="eredmeny-screen">
    <div class="eredmeny-card">
      <div class="eredmeny-szazalek" id="er-szazalek">–</div>
      <div class="eredmeny-szoveg" id="er-szoveg"></div>
      <div class="eredmeny-lista" id="er-lista"></div>
      <button class="btn btn-primary" onclick="ujrakezdés()">🔄 Újra kezdem</button>
    </div>
  </div>

  <script>
    let kerdesek = [];
    let aktualis = 0;
    let pontszam = 0;
    let valasztott = null;      // egyszerű kérdéshez
    let valasztottak = [];      // többszörös kérdéshez
    let valaszolva = false;
    let eredmenyek = [];

    async function betolt() {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('hiba').style.display = 'none';
      document.getElementById('kviz-screen').style.display = 'none';
      document.getElementById('eredmeny-screen').style.display = 'none';

      try {
        const resp = await fetch('/api/100-vegyes-kerdes-uj');
        if (!resp.ok) throw new Error('Szerver hiba: ' + resp.status);
        const data = await resp.json();
        if (data.hiba) throw new Error(data.hiba);
        if (!data.kerdesek || data.kerdesek.length === 0) throw new Error('Nincsenek kérdések az adatbázisban.');

        kerdesek = data.kerdesek;
        aktualis = 0;
        pontszam = 0;
        eredmenyek = [];

        document.getElementById('loading').style.display = 'none';
        document.getElementById('kviz-screen').style.display = 'block';
        mutatKerdes();
      } catch (e) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('hiba').style.display = 'block';
        document.getElementById('hiba-szoveg').textContent = e.message;
      }
    }

    function mutatKerdes() {
      valaszolva = false;
      valasztott = null;
      valasztottak = [];

      const k = kerdesek[aktualis];
      const total = kerdesek.length;
      const isTobbszoros = k.tobbszoros == 1;

      document.getElementById('kerdes-szam').textContent = `Kérdés ${aktualis + 1}`;
      document.getElementById('kerdes-szoveg').textContent = k.kerdes;
      document.getElementById('progress-szoveg').textContent = `${aktualis + 1} / ${total}`;
      document.getElementById('pontszam-label').textContent = `${pontszam} helyes`;
      document.getElementById('progress-fill').style.width = `${(aktualis / total) * 100}%`;

      const badge = document.getElementById('kerdes-badge');
      if (isTobbszoros) {
        badge.innerHTML = '<span class="tobbszoros-badge">Több helyes válasz lehetséges</span>';
      } else {
        badge.innerHTML = '<span class="egyszerű-badge">Egy helyes válasz</span>';
      }

      const feedback = document.getElementById('feedback');
      feedback.className = 'feedback';
      feedback.textContent = '';

      document.getElementById('ellenor-btn').style.display = isTobbszoros ? 'inline-block' : 'none';
      document.getElementById('tovabb-btn').style.display = 'none';

      const betuk = ['a', 'b', 'c', 'd', 'e'];
      const cont = document.getElementById('valaszok');
      cont.innerHTML = '';

      betuk.forEach(b => {
        const szoveg = k[`valasz_${b}`];
        if (!szoveg) return;

        const btn = document.createElement('button');
        btn.className = 'valasz-btn';
        btn.dataset.valasz = b;
        btn.innerHTML = `<span class="betujel">${b}</span><span>${szoveg}</span>`;

        if (isTobbszoros) {
          btn.onclick = () => toggleValasz(b, btn);
        } else {
          btn.onclick = () => egyszeruKivalaszt(b, btn);
        }

        cont.appendChild(btn);
      });
    }

    // --- Egyszerű kérdés logika ---
    function egyszeruKivalaszt(valasz, btn) {
      if (valaszolva) return;
      document.querySelectorAll('.valasz-btn').forEach(b => {
        b.style.borderColor = '';
        b.style.background = '';
      });
      btn.style.borderColor = 'var(--primary)';
      btn.style.background = '#eef1ff';
      valasztott = valasz;
      ellenorEgyszerű();
    }

    async function ellenorEgyszerű() {
      if (valaszolva || !valasztott) return;
      valaszolva = true;

      const k = kerdesek[aktualis];
      const btns = document.querySelectorAll('.valasz-btn');
      btns.forEach(b => { b.disabled = true; b.style.borderColor = ''; b.style.background = ''; });

      try {
        const resp = await fetch('/api/ellenor-uj', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: k.id, valasz: valasztott })
        });
        const data = await resp.json();

        const feedback = document.getElementById('feedback');
        const map = { igaz: 'a', hamis: 'b' };
        const raw = String(data.helyes_valasz).trim().toLowerCase();
        const helyesValasz = map[raw] || raw;
        const valaszHelyes = valasztott === helyesValasz;

        btns.forEach(b => {
          if (b.dataset.valasz === helyesValasz) b.classList.add('helyes');
          else if (b.dataset.valasz === valasztott && !valaszHelyes) b.classList.add('hibas');
        });

        if (valaszHelyes) {
          pontszam++;
          feedback.textContent = '✓ Helyes válasz!';
          feedback.className = 'feedback show jo';
        } else {
          feedback.textContent = `✗ Sajnos nem. A helyes válasz: ${data.helyes_valasz.toUpperCase()}`;
          feedback.className = 'feedback show rossz';
        }

        document.getElementById('pontszam-label').textContent = `${pontszam} helyes`;
        document.getElementById('tovabb-btn').style.display = 'inline-block';

        eredmenyek.push({
          kerdes: k.kerdes,
          helyes: valaszHelyes,
          helyes_valasz: helyesValasz,
          adott_valasz: valasztott,
          tipus: 'egyszerű'
        });
      } catch (e) {
        document.getElementById('feedback').textContent = 'Hálózati hiba. Próbáld újra.';
        document.getElementById('feedback').className = 'feedback show rossz';
        valaszolva = false;
      }
    }

    // --- Többszörös kérdés logika ---
    function toggleValasz(valasz, btn) {
      if (valaszolva) return;
      if (valasztottak.includes(valasz)) {
        valasztottak = valasztottak.filter(v => v !== valasz);
        btn.classList.remove('kivalasztott');
      } else {
        valasztottak.push(valasz);
        btn.classList.add('kivalasztott');
      }
    }

    async function ellenorTobbszoros() {
      if (valaszolva) return;

      if (valasztottak.length === 0) {
        const feedback = document.getElementById('feedback');
        feedback.textContent = 'Válassz ki legalább egy választ.';
        feedback.className = 'feedback show rossz';
        return;
      }

      valaszolva = true;

      const k = kerdesek[aktualis];
      const btns = document.querySelectorAll('.valasz-btn');
      btns.forEach(b => { b.disabled = true; b.classList.remove('helyes', 'hibas'); });

      try {
        const resp = await fetch('/api/tobbszoros-ellenor-uj', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: k.id, valaszok: valasztottak })
        });
        const data = await resp.json();

        if (!resp.ok) throw new Error(data.hiba || 'Hiba történt.');

        const feedback = document.getElementById('feedback');
        const helyesValaszok = data.helyes_valaszok || [];
        const valaszHelyes = data.helyes === true;

        btns.forEach(b => {
          const betu = b.dataset.valasz;
          if (helyesValaszok.includes(betu)) {
            b.classList.remove('kivalasztott');
            b.classList.add('helyes');
          }
          if (valasztottak.includes(betu) && !helyesValaszok.includes(betu)) {
            b.classList.remove('kivalasztott');
            b.classList.add('hibas');
          }
        });

        if (valaszHelyes) {
          pontszam++;
          feedback.textContent = '✓ Helyes válasz!';
          feedback.className = 'feedback show jo';
        } else {
          const teValaszod = valasztottak.map(v => v.toUpperCase()).join(', ');
          const helyes = helyesValaszok.map(v => v.toUpperCase()).join(', ');
          feedback.textContent = `✗ Sajnos nem. Te válaszod: ${teValaszod} — Helyes válasz: ${helyes}`;
          feedback.className = 'feedback show rossz';
        }

        document.getElementById('pontszam-label').textContent = `${pontszam} helyes`;
        document.getElementById('ellenor-btn').style.display = 'none';
        document.getElementById('tovabb-btn').style.display = 'inline-block';

        eredmenyek.push({
          kerdes: k.kerdes,
          helyes: valaszHelyes,
          helyes_valasz: helyesValaszok.join(', '),
          adott_valasz: valasztottak.join(', '),
          tipus: 'többszörös'
        });
      } catch (e) {
        document.getElementById('feedback').textContent = 'Hálózati hiba: ' + e.message;
        document.getElementById('feedback').className = 'feedback show rossz';
        valaszolva = false;
        btns.forEach(b => b.disabled = false);
      }
    }

    // Ellenőrzés gomb – többszörös esetén hívódik meg
    function ellenor() {
      const k = kerdesek[aktualis];
      if (k.tobbszoros == 1) {
        ellenorTobbszoros();
      }
    }

    function kovetkezo() {
      if (!valaszolva) {
        const k = kerdesek[aktualis];
        eredmenyek.push({ kerdes: k.kerdes, helyes: false, helyes_valasz: '?', adott_valasz: '–', kihagyva: true });
      }

      aktualis++;
      if (aktualis >= kerdesek.length) {
        mutatEredmeny();
      } else {
        mutatKerdes();
      }
    }

    function mutatEredmeny() {
      document.getElementById('kviz-screen').style.display = 'none';
      document.getElementById('eredmeny-screen').style.display = 'block';

      const total = kerdesek.length;
      const szazalek = Math.round((pontszam / total) * 100);

      document.getElementById('er-szazalek').textContent = `${szazalek}%`;

      let uzenet;
      if (szazalek >= 90) uzenet = `Kiváló! ${pontszam}/${total} helyes — remek teljesítmény!`;
      else if (szazalek >= 70) uzenet = `Jó munka! ${pontszam}/${total} helyes válasz.`;
      else if (szazalek >= 50) uzenet = `${pontszam}/${total} helyes. Van még hova fejlődni!`;
      else uzenet = `${pontszam}/${total} helyes. Próbáld újra!`;

      document.getElementById('er-szoveg').textContent = uzenet;

      const lista = document.getElementById('er-lista');
      lista.innerHTML = '';
      eredmenyek.forEach((e, i) => {
        const sor = document.createElement('div');
        sor.className = 'eredmeny-sor';
        const tipusBadge = e.tipus === 'többszörös'
          ? '<span style="font-size:0.72rem;background:#f76707;color:white;padding:1px 7px;border-radius:10px;margin-left:6px;">többszörös</span>'
          : '';
        sor.innerHTML = `
          <div class="sor-ikon ${e.helyes ? 'jo' : 'rossz'}">${e.helyes ? '✓' : '✗'}</div>
          <div>
            <div style="font-weight:600;margin-bottom:2px;">${i + 1}. ${e.kerdes}${tipusBadge}</div>
            <div style="font-size:0.82rem;color:var(--muted);">
              ${e.kihagyva ? 'Kihagyva' : `Te: ${e.adott_valasz.toUpperCase()} — Helyes: ${e.helyes_valasz.toUpperCase()}`}
            </div>
          </div>
        `;
        lista.appendChild(sor);
      });
      mentesEredmeny();
    }

    async function mentesEredmeny() {
      const szazalek = Math.round(pontszam);
      try {
        await fetch('/api/teszt-mentes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ eredmeny: szazalek, teszt_tipusa: 'vegyes' })
        });
      } catch (e) {
        console.error('Mentési hiba:', e);
      }
    }

    function ujrakezdés() {
      betolt();
    }

    function go(url) {
      window.location.href = url;
    }

    betolt();
  </script>
</body>
</html>
