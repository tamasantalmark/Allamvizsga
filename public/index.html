<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kvíz</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f6fb;
      --card: #ffffff;
      --primary: #4f6ef7;
      --primary-dark: #3a56d4;
      --success: #22c55e;
      --danger: #ef4444;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --radius: 14px;
    }

    body {
      background: var(--bg);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
    }

    header {
      width: 100%;
      max-width: 1920px;
      margin-bottom: 32px;
      text-align: center;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: -0.5px;
    }

    header p {
      color: var(--muted);
      margin-top: 6px;
      font-size: 0.95rem;
    }

    /* Haladásjelző */
    .progress-bar-wrap {
      width: 100%;
      background: var(--border);
      border-radius: 99px;
      height: 8px;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .progress-label {
      width: 100%;
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 24px;
    }

    /* Kártya */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 32px;
      width: 100%;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    }

    .question-number {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 10px;
    }

    .question-text {
      font-size: 1.2rem;
      font-weight: 600;
      line-height: 1.5;
      margin-bottom: 24px;
    }

    /* Válaszok */
    .valaszok {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .valasz-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      cursor: pointer;
      font-size: 0.97rem;
      color: var(--text);
      text-align: left;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      width: 100%;
    }

    .valasz-btn:hover:not(:disabled) {
      border-color: var(--primary);
      background: #eef1ff;
      transform: translateX(2px);
    }

    .valasz-btn:disabled { cursor: default; }

    .valasz-btn .betujel {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.85rem;
      flex-shrink: 0;
      text-transform: uppercase;
      transition: background 0.15s, color 0.15s;
    }

    .valasz-btn.helyes {
      border-color: var(--success);
      background: #f0fdf4;
    }
    .valasz-btn.helyes .betujel {
      background: var(--success);
      color: white;
    }

    .valasz-btn.hibas {
      border-color: var(--danger);
      background: #fff5f5;
    }
    .valasz-btn.hibas .betujel {
      background: var(--danger);
      color: white;
    }

    .valasz-btn.kiemelt {
      border-color: var(--success);
      background: #f0fdf4;
    }
    .valasz-btn.kiemelt .betujel {
      background: var(--success);
      color: white;
    }

    /* Visszajelzés */
    .feedback {
      margin-top: 18px;
      padding: 12px 16px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.97rem;
      display: none;
    }
    .feedback.show { display: block; }
    .feedback.jo { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    .feedback.rossz { background: #fff5f5; color: #dc2626; border: 1px solid #fecaca; }

    /* Gombok */
    .btn-row {
      margin-top: 24px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .btn {
      padding: 11px 26px;
      border-radius: 9px;
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: var(--primary);
      color: white;
    }
    .btn-primary:hover { background: var(--primary-dark); }

    .btn-outline {
      background: transparent;
      color: var(--primary);
      border: 1.5px solid var(--primary);
    }
    .btn-outline:hover { background: #eef1ff; }

    /* Eredmény képernyő */
    #eredmeny-screen {
      display: none;
      width: 100%;
    }

    .eredmeny-card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    }

    .eredmeny-szazalek {
      font-size: 4rem;
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
    }

    .eredmeny-szoveg {
      font-size: 1.1rem;
      color: var(--muted);
      margin-top: 8px;
      margin-bottom: 28px;
    }

    .eredmeny-lista {
      text-align: left;
      margin: 24px 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 340px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .eredmeny-sor {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      background: var(--bg);
    }

    .sor-ikon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      color: white;
      font-weight: 700;
    }
    .sor-ikon.jo { background: var(--success); }
    .sor-ikon.rossz { background: var(--danger); }

    /* Töltés / hiba */
    #loading, #hiba {
      width: 100%;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 1.05rem;
    }
    #hiba { color: var(--danger); display: none; }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #kviz-screen { display: none; width: 100%; }

    @media (max-width: 500px) {
      .card { padding: 22px 16px; }
      .question-text { font-size: 1.05rem; }
      .eredmeny-szazalek { font-size: 3rem; }
    }
  </style>
</head>
<body>

  <header>
    <h1>Semmelweis Egyetem - ETK - Gyógytornász államvizsga tesztbank kérdések</h1>
    <p>Egyszerű feleletválasztás és Igaz/Hamis kérdések</p>
  </header>

  <!-- Töltés -->
  <div id="loading">
    <div class="spinner"></div>
    Kérdések betöltése…
  </div>

  <!-- Hiba -->
  <div id="hiba">
    ⚠️ <span id="hiba-szoveg"></span>
    <br><br>
    <button class="btn btn-primary" onclick="betolt()">Újra próbálom</button>
  </div>

  <!-- Kvíz -->
  <div id="kviz-screen">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width: 0%"></div>
    </div>
    <div class="progress-label">
      <span id="progress-szoveg">1 / ?</span>
      <span id="pontszam-label">0 helyes</span>
    </div>

    <div class="card">
      <div class="question-number" id="kerdes-szam">Kérdés 1</div>
      <div class="question-text" id="kerdes-szoveg"></div>
      <div class="valaszok" id="valaszok"></div>
      <div class="feedback" id="feedback"></div>
      <div class="btn-row">
        <button class="btn btn-outline" id="kihagyom-btn" onclick="kovetkezo()">Kihagyom</button>
        <button class="btn btn-primary" id="tovabb-btn" onclick="kovetkezo()" style="display:none">Következő →</button>
      </div>
    </div>
  </div>

  <!-- Eredmény -->
  <div id="eredmeny-screen">
    <div class="eredmeny-card">
      <div class="eredmeny-szazalek" id="er-szazalek">–</div>
      <div class="eredmeny-szoveg" id="er-szoveg"></div>
      <div class="eredmeny-lista" id="er-lista"></div>
      <button class="btn btn-primary" onclick="ujrakezdés()">🔄 Újra kezdem</button>
    </div>
  </div>

  <script>
    let kerdesek = [];
    let aktualis = 0;
    let pontszam = 0;
    let valasztott = null;
    let valaszolva = false;
    let eredmenyek = [];

    async function betolt() {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('hiba').style.display = 'none';
      document.getElementById('kviz-screen').style.display = 'none';
      document.getElementById('eredmeny-screen').style.display = 'none';

      try {
        const resp = await fetch('/api/kerdesek');
        if (!resp.ok) throw new Error('Szerver hiba: ' + resp.status);
        const data = await resp.json();
        if (data.hiba) throw new Error(data.hiba);
        if (!data.kerdesek || data.kerdesek.length === 0) throw new Error('Nincsenek kérdések az adatbázisban.');

        kerdesek = data.kerdesek;
        aktualis = 0;
        pontszam = 0;
        eredmenyek = [];

        document.getElementById('loading').style.display = 'none';
        document.getElementById('kviz-screen').style.display = 'block';
        mutatKerdes();
      } catch (e) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('hiba').style.display = 'block';
        document.getElementById('hiba-szoveg').textContent = e.message;
      }
    }

    function mutatKerdes() {
      valaszolva = false;
      valasztott = null;
      const k = kerdesek[aktualis];
      const total = kerdesek.length;

      document.getElementById('kerdes-szam').textContent = `Kérdés ${aktualis + 1}`;
      document.getElementById('kerdes-szoveg').textContent = k.kerdes;
      document.getElementById('progress-szoveg').textContent = `${aktualis + 1} / ${total}`;
      document.getElementById('pontszam-label').textContent = `${pontszam} helyes`;
      document.getElementById('progress-fill').style.width = `${(aktualis / total) * 100}%`;

      const feedback = document.getElementById('feedback');
      feedback.className = 'feedback';
      feedback.textContent = '';

      document.getElementById('kihagyom-btn').style.display = 'inline-block';
      document.getElementById('tovabb-btn').style.display = 'none';

      // Válaszok renderelése
      const betuk = ['a', 'b', 'c', 'd', 'e'];
      const cont = document.getElementById('valaszok');
      cont.innerHTML = '';

      betuk.forEach(b => {
        const szoveg = k[`valasz_${b}`];
        if (!szoveg) return;

        const btn = document.createElement('button');
        btn.className = 'valasz-btn';
        btn.dataset.valasz = b;
        btn.innerHTML = `<span class="betujel">${b}</span><span>${szoveg}</span>`;
        btn.onclick = () => kivalaszt(b, btn);
        cont.appendChild(btn);
      });
    }

    function kivalaszt(valasz, btn) {
      if (valaszolva) return;
      // Kijelölés vizuálisan (még nem ellenőriz)
      document.querySelectorAll('.valasz-btn').forEach(b => b.classList.remove('kivalasztott'));
      btn.style.borderColor = 'var(--primary)';
      btn.style.background = '#eef1ff';
      valasztott = valasz;

      // Automatikusan ellenőrzi
      ellenor();
    }

    async function ellenor() {
      if (valaszolva || !valasztott) return;
      valaszolva = true;

      const k = kerdesek[aktualis];
      const btns = document.querySelectorAll('.valasz-btn');
      btns.forEach(b => { b.disabled = true; b.style.borderColor = ''; b.style.background = ''; });

      try {
        const resp = await fetch('/api/ellenor', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: k.id, valasz: valasztott })
        });
        const data = await resp.json();

        const feedback = document.getElementById('feedback');

        // Megjelöli a gombokat
        btns.forEach(b => {
          if (b.dataset.valasz === data.helyes_valasz) {
            b.classList.add('helyes');
          } else if (b.dataset.valasz === valasztott && !data.helyes) {
            b.classList.add('hibas');
          }
        });

        if (data.helyes) {
          pontszam++;
          feedback.textContent = '✓ Helyes válasz!';
          feedback.className = 'feedback show jo';
        } else {
          feedback.textContent = `✗ Sajnos nem. A helyes válasz: ${data.helyes_valasz.toUpperCase()}`;
          feedback.className = 'feedback show rossz';
        }

        document.getElementById('pontszam-label').textContent = `${pontszam} helyes`;
        document.getElementById('kihagyom-btn').style.display = 'none';
        document.getElementById('tovabb-btn').style.display = 'inline-block';

        eredmenyek.push({
          kerdes: k.kerdes,
          helyes: data.helyes,
          helyes_valasz: data.helyes_valasz,
          adott_valasz: valasztott
        });
      } catch (e) {
        document.getElementById('feedback').textContent = 'Hálózati hiba. Próbáld újra.';
        document.getElementById('feedback').className = 'feedback show rossz';
        valaszolva = false;
      }
    }

    function kovetkezo() {
      if (!valaszolva) {
        // Kihagyás
        const k = kerdesek[aktualis];
        eredmenyek.push({ kerdes: k.kerdes, helyes: false, helyes_valasz: '?', adott_valasz: '–', kihagyva: true });
      }

      aktualis++;
      if (aktualis >= kerdesek.length) {
        mutatEredmeny();
      } else {
        mutatKerdes();
      }
    }

    function mutatEredmeny() {
      document.getElementById('kviz-screen').style.display = 'none';
      document.getElementById('eredmeny-screen').style.display = 'block';

      const total = kerdesek.length;
      const szazalek = Math.round((pontszam / total) * 100);

      document.getElementById('er-szazalek').textContent = `${szazalek}%`;

      let uzenet;
      if (szazalek >= 90) uzenet = `Kiváló! ${pontszam}/${total} helyes — remek teljesítmény! 🎉`;
      else if (szazalek >= 70) uzenet = `Jó munka! ${pontszam}/${total} helyes válasz. 👍`;
      else if (szazalek >= 50) uzenet = `${pontszam}/${total} helyes. Van még hova fejlődni! 💪`;
      else uzenet = `${pontszam}/${total} helyes. Próbáld újra! 📖`;

      document.getElementById('er-szoveg').textContent = uzenet;

      const lista = document.getElementById('er-lista');
      lista.innerHTML = '';
      eredmenyek.forEach((e, i) => {
        const sor = document.createElement('div');
        sor.className = 'eredmeny-sor';
        sor.innerHTML = `
          <div class="sor-ikon ${e.helyes ? 'jo' : 'rossz'}">${e.helyes ? '✓' : '✗'}</div>
          <div>
            <div style="font-weight:600;margin-bottom:2px;">${i + 1}. ${e.kerdes}</div>
            <div style="font-size:0.82rem;color:var(--muted);">
              ${e.kihagyva ? 'Kihagyva' : `Te: ${e.adott_valasz.toUpperCase()} — Helyes: ${e.helyes_valasz.toUpperCase()}`}
            </div>
          </div>
        `;
        lista.appendChild(sor);
      });
    }

    function ujrakezdés() {
      betolt();
    }

    // Indítás
    betolt();
  </script>
</body>
</html>
